version: '3.9'

services:

  # ── Banco de dados ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: visuvarejo-db
    environment:
      POSTGRES_DB: visuvarejo
      POSTGRES_USER: visuvarejo
      POSTGRES_PASSWORD: visuvarejo_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visuvarejo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache (Redis) ─────────────────────────────────────────────────────────
  # Já incluído aqui para não precisar reconfigurar depois na Fase 2.
  redis:
    image: redis:7-alpine
    container_name: visuvarejo-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Aplicação Spring Boot ─────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visuvarejo-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: visuvarejo
      DB_USER: visuvarejo
      DB_PASS: visuvarejo_pass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-visuvarejo-secret-key-mude-em-producao-use-256bits}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
