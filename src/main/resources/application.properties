# ── Perfil ativo padrão (desenvolvimento local) ───────────────────────────
spring.application.name=visuvarejo

# ── Banco de dados (PostgreSQL local) ─────────────────────────────────────
# Para rodar sem Docker: instale PostgreSQL localmente e crie o banco.
# Para rodar com Docker: use o perfil "docker" (spring.profiles.active=docker)
spring.datasource.url=postgresql://neondb_owner:npg_QJiR2G8zLKeY@ep-silent-math-acmf8sno.sa-east-1.aws.neon.tech/neondb?sslmode=require  
# jdbc:postgresql://localhost:5432/visuvarejo
spring.datasource.username=visuvarejo
spring.datasource.password=visuvarejo_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────
# "validate" garante que o schema do banco bate com as entidades.
# Flyway é quem cria/evolui o schema — Hibernate não deve fazer isso.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ────────────────────────────────────────────────────────────────
# Flyway roda as migrations em src/main/resources/db/migration automaticamente.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── Redis ────────────────────────────────────────────────────────────────
# spring.data.redis.host=localhost
# spring.data.redis.port=6379

# ── JWT ───────────────────────────────────────────────────────────────────
# IMPORTANTE: em produção, sobrescreva via variável de ambiente JWT_SECRET.
jwt.secret=${JWT_SECRET:visuvarejo-secret-key-mude-em-producao-use-256bits}
jwt.expiration=86400000

# ── OpenAPI / Swagger UI ──────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operationsSorter=method

# ── Actuator (saúde e métricas — base para Prometheus na Fase 2) ──────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
