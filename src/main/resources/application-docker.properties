# Perfil "docker": ativo quando SPRING_PROFILES_ACTIVE=docker.
# Todas as variáveis de ambiente são injetadas pelo docker-compose.yml.

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

jwt.secret=${JWT_SECRET}

# Logs mais limpos em container (sem cores ANSI)
spring.output.ansi.enabled=never

# Habilita os endpoints de saúde (health), métricas (metrics) e informações (info)
management.endpoints.web.exposure.include=health,metrics,info

# Mostra detalhes no /health apenas para quem está autorizado (ou "always" para facilitar agora no Docker)
management.endpoint.health.show-details=always

# Habilita sondagens mais profundas (verifica o DB e o Redis automaticamente)
management.health.db.enabled=true
management.health.redis.enabled=true
